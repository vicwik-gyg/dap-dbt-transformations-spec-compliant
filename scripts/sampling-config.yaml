# Sampling configuration for deterministic production seed generation.
# Each entry maps a seed file to its production source.

connection:
  # Host and http_path are read from the databricks CLI profile.
  # Override via env vars: DATABRICKS_HOST, DATABRICKS_HTTP_PATH
  auth_profile: bridge  # uses `databricks auth token --profile bridge`

seeds:
  - name: seed_destinations
    source_query: |
      SELECT
        id as destination_id,
        name as destination_name,
        city as destination_city,
        country as destination_country,
        continent as destination_continent,
        CASE WHEN status = 'active' THEN true ELSE false END as is_active,
        creation_timestamp as created_at,
        update_timestamp as updated_at
      FROM production.db_mirror_dbz.`catalog__location`
      WHERE type = 'city'
        AND abs(hash(cast(id as string))) % 30 < 1
      ORDER BY id
    pk_column: destination_id
    target_file: seeds/seed_destinations.csv
    sample_note: "~1K from ~30K city-type locations"

  - name: seed_suppliers
    source_query: |
      SELECT
        s.supplier_id,
        s.name as supplier_name,
        s.location_id as destination_id,
        CASE WHEN s.is_verified = 1 THEN true ELSE false END as is_verified,
        CASE WHEN s.is_active = 1 THEN true ELSE false END as is_active,
        s.creation_timestamp as created_at,
        s.update_timestamp as updated_at
      FROM production.db_mirror_dbz.`catalog__supplier` s
      WHERE s.location_id IN ({{destination_ids}})
        AND abs(hash(cast(s.supplier_id as string))) % 377 < 1
      ORDER BY s.supplier_id
    pk_column: supplier_id
    target_file: seeds/seed_suppliers.csv
    depends_on: [seed_destinations]
    fk_filter: destination_ids
    sample_note: "~1K suppliers linked to sampled destinations"

  - name: seed_supplier_history
    source_query: |
      SELECT
        supplier_id,
        name as supplier_name,
        location_id as destination_id,
        CASE WHEN is_verified = 1 THEN true ELSE false END as is_verified,
        CASE WHEN is_active = 1 THEN true ELSE false END as is_active,
        binlog_timestamp as valid_from,
        operation
      FROM production.db_mirror_dbz.`catalog__supplier_history`
      WHERE supplier_id IN ({{supplier_ids}})
      ORDER BY supplier_id, binlog_timestamp
    pk_column: supplier_id
    target_file: seeds/seed_supplier_history.csv
    depends_on: [seed_suppliers]
    fk_filter: supplier_ids
    sample_note: "All history rows for sampled suppliers"
    post_process: compute_valid_to

  - name: seed_tours
    source_query: |
      SELECT
        t.tour_id,
        tt.title as tour_name,
        t.supplier_id,
        tl.location_id as destination_id,
        tc.category_name as tour_category,
        CAST(t.retail_price * 100 AS BIGINT) as price_in_cents,
        'EUR' as currency_code,
        t.duration as duration_minutes,
        CASE WHEN t.status = 'active' THEN true ELSE false END as is_active,
        t.creation_timestamp as created_at,
        t.update_timestamp as updated_at
      FROM production.db_mirror_dbz.`catalog__tour` t
      LEFT JOIN production.db_mirror_dbz.`catalog__tour_text` tt
        ON t.tour_id = tt.tour_id AND tt.language_id = 1
      LEFT JOIN (
        SELECT tour_id, MIN(location_id) as location_id
        FROM production.db_mirror_dbz.`catalog__tour_to_location`
        GROUP BY tour_id
      ) tl ON t.tour_id = tl.tour_id
      LEFT JOIN (
        SELECT tc2.tour_id, c.name as category_name
        FROM production.db_mirror_dbz.`catalog__tour_to_category` tc2
        JOIN production.db_mirror_dbz.`catalog__tour_business_category` c
          ON tc2.category_id = c.id
        WHERE tc2.is_primary = true
      ) tc ON t.tour_id = tc.tour_id
      WHERE t.supplier_id IN ({{supplier_ids}})
        AND abs(hash(cast(t.tour_id as string))) % 200 < 1
      ORDER BY t.tour_id
    pk_column: tour_id
    target_file: seeds/seed_tours.csv
    depends_on: [seed_suppliers]
    fk_filter: supplier_ids
    sample_note: "~1K tours from sampled suppliers"

  - name: seed_bookings
    source_query: |
      SELECT
        b.booking_id,
        b.tour_option_id as tour_id,
        abs(hash(cast(b.customer_id_anon as string))) % 2147483647 as customer_id,
        b.supplier_id,
        tl.location_id as destination_id,
        b.status as booking_status,
        b.total_number_of_participants as number_of_participants,
        CAST(b.customer_total_price * 100 AS BIGINT) as total_price_in_cents,
        'EUR' as currency_code,
        b.commission_rate,
        b.creation_timestamp as checkout_at,
        b.tour_start_datetime as travel_at,
        b.creation_timestamp as created_at,
        b.date_of_cancelation as cancelled_at
      FROM production.db_mirror_dbz.`gyg__booking` b
      LEFT JOIN (
        SELECT tour_id, MIN(location_id) as location_id
        FROM production.db_mirror_dbz.`catalog__tour_to_location`
        GROUP BY tour_id
      ) tl ON b.tour_option_id = tl.tour_id
      WHERE b.tour_option_id IN ({{tour_ids}})
        AND abs(hash(cast(b.booking_id as string))) % 50000 < 1
      ORDER BY b.booking_id
    pk_column: booking_id
    target_file: seeds/seed_bookings.csv
    depends_on: [seed_tours]
    fk_filter: tour_ids
    sample_note: "~1K bookings for sampled tours"

  - name: seed_booking_status_history
    source_query: |
      SELECT
        booking_id,
        status as booking_status,
        update_timestamp as changed_at,
        update_user_type as changed_by
      FROM production.db_mirror_dbz.`gyg__booking_history`
      WHERE booking_id IN ({{booking_ids}})
      ORDER BY booking_id, update_timestamp
    pk_column: booking_id
    target_file: seeds/seed_booking_status_history.csv
    depends_on: [seed_bookings]
    fk_filter: booking_ids
    sample_note: "All status history for sampled bookings"

  - name: seed_care_tickets
    source_query: |
      SELECT
        ticket_id,
        booking_id,
        abs(hash(cast(coalesce(cast(booking_id as string), '') as string))) % 2147483647 as customer_id,
        COALESCE(contact_reason_id, 'general_inquiry') as ticket_category,
        COALESCE(ticket_priority, 'medium') as ticket_priority,
        status as ticket_status,
        date_of_creation as created_at,
        NULL as first_response_at,
        CASE WHEN status IN ('solved', 'closed') THEN date_of_update ELSE NULL END as resolved_at
      FROM production.care.fact_care_ticket
      WHERE booking_id IN ({{booking_ids}})
        AND is_ignore_ticket = false
      ORDER BY ticket_id
    pk_column: ticket_id
    target_file: seeds/seed_care_tickets.csv
    depends_on: [seed_bookings]
    fk_filter: booking_ids
    sample_note: "Care tickets for sampled bookings"
