version: 2
models:
  - name: agg_bookings_checkout_daily
    description: Daily aggregate of bookings by checkout date.
    config:
      group: boi
    meta:
      owner: boi
      synonyms: [daily_bookings]
    columns:
      - name: checkout_date
        description: Date of customer checkout.
        tests: [unique, not_null]
      - name: total_bookings
        description: Total bookings.
      - name: confirmed_bookings
        description: Confirmed bookings.
      - name: cancelled_bookings
        description: Cancelled bookings.
      - name: total_participants
        description: Total participants.
      - name: gross_bookings_in_cents
        description: Gross revenue in cents.
      - name: net_bookings_in_cents
        description: Net revenue in cents.
      - name: total_commission_in_cents
        description: Commission in cents.
      - name: cancellation_rate
        description: Cancellation rate (0.0 to 1.0).
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1

  - name: agg_bookings_destination_daily
    description: Daily aggregate by destination and checkout date.
    config:
      group: boi
    meta:
      owner: boi
      synonyms: [destination_daily]
    columns:
      - name: checkout_date
        description: Checkout date.
        tests: [not_null]
      - name: destination_id
        description: Destination ID.
        tests: [not_null]
      - name: destination_name
        description: Destination name.
      - name: destination_country
        description: Destination country.
      - name: destination_continent
        description: Destination continent.
      - name: total_bookings
        description: Total bookings.
      - name: confirmed_bookings
        description: Confirmed bookings.
      - name: cancelled_bookings
        description: Cancelled bookings.
      - name: total_participants
        description: Total participants.
      - name: gross_bookings_in_cents
        description: Gross revenue in cents.
      - name: net_bookings_in_cents
        description: Net revenue in cents.
      - name: total_commission_in_cents
        description: Commission in cents.

  - name: agg_bookings_tour_category_monthly
    description: Monthly aggregate by tour category.
    config:
      group: boi
    meta:
      owner: boi
      synonyms: [category_monthly]
    columns:
      - name: checkout_month
        description: First day of checkout month.
        tests: [not_null]
      - name: tour_category
        description: Tour category.
        tests: [not_null]
        meta:
          spec_check_suppress:
            - rule: "tests.accepted_values_on_enums"
              justification: "Open-domain classification from source — unbounded set of values"
      - name: total_bookings
        description: Total bookings.
      - name: confirmed_bookings
        description: Confirmed bookings.
      - name: cancelled_bookings
        description: Cancelled bookings.
      - name: total_participants
        description: Total participants.
      - name: gross_bookings_in_cents
        description: Gross revenue in cents.
      - name: net_bookings_in_cents
        description: Net revenue in cents.
      - name: total_commission_in_cents
        description: Commission in cents.
      - name: avg_booking_value_in_cents
        description: Average booking value in cents.
      - name: cancellation_rate
        description: Cancellation rate.

  - name: agg_bookings_supplier_monthly
    description: >
      Monthly aggregate of bookings by supplier. Provides supplier-level
      performance metrics including volume, revenue, and commission for
      supplier operations and payout analysis.
    config:
      group: boi
      materialized: view
    meta:
      owner: boi
      synonyms: [supplier_monthly, supplier_performance]
      spec_check_suppress:
        - rule: "tests.unique_on_pk"
          justification: "Composite grain (checkout_month, supplier_id) — neither column alone is unique"
    columns:
      - name: checkout_month
        description: First day of the checkout month (truncated to month grain).
        data_type: date
        tests:
          - not_null
      - name: supplier_id
        description: Foreign key to the supplier.
        data_type: bigint
        tests:
          - not_null
          - relationships:
              to: ref('stg_seed_data__suppliers')
              field: supplier_id
              config:
                severity: warn
      - name: total_bookings
        description: Total number of bookings for this supplier in the month.
        data_type: bigint
      - name: confirmed_bookings
        description: Number of non-cancelled bookings.
        data_type: bigint
      - name: cancelled_bookings
        description: Number of cancelled bookings.
        data_type: bigint
      - name: total_participants
        description: Total number of participants across all bookings.
        data_type: bigint
      - name: gross_bookings_in_cents
        description: Total revenue from all bookings in cents (including cancelled).
        data_type: bigint
      - name: net_bookings_in_cents
        description: Revenue from confirmed bookings only, in cents.
        data_type: bigint
      - name: total_commission_in_cents
        description: Sum of GYG commission in cents.
        data_type: bigint
      - name: total_supplier_payout_in_cents
        description: Sum of supplier payouts in cents.
        data_type: bigint
