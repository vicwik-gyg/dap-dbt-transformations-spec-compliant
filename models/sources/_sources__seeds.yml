version: 2

sources:
  - name: seed_data
    description: >
      Seed data representing a representative slice of the GYG data platform.
      These seeds simulate source tables from Kafka, Debezium mirrors, and
      application databases. In the real repo these would be Databricks sources.
    schema: "dbt_default"
    tables:
      - name: seed_destinations
        description: Reference data for travel destinations (simulates db_mirror_dbz.catalog__location).
        columns:
          - name: destination_id
            description: Unique identifier for each destination.
          - name: destination_name
            description: Human-readable name of the destination.

      - name: seed_suppliers
        description: Supplier account data (simulates db_mirror_dbz.gyg__supplier).
        columns:
          - name: supplier_id
            description: Unique identifier for each supplier.
          - name: supplier_name
            description: Business name of the supplier.

      - name: seed_tours
        description: Tour/activity catalog (simulates db_mirror_dbz.gyg__tour).
        columns:
          - name: tour_id
            description: Unique identifier for each tour.
          - name: tour_name
            description: Display name of the tour.

      - name: seed_bookings
        description: Transaction records (simulates db_mirror_dbz.gyg__booking).
        columns:
          - name: booking_id
            description: Unique identifier for each booking.
          - name: booking_status
            description: Current status of the booking (confirmed, cancelled, pending).

      - name: seed_supplier_history
        description: >
          SCD2 history of supplier attribute changes (simulates db_mirror_dbz.gyg__supplier_history).
          Each row represents a version with valid_from/valid_to window.
        columns:
          - name: supplier_id
            description: Supplier identifier — not unique, repeats across versions.
          - name: valid_from
            description: Start of this version's validity window.
          - name: valid_to
            description: End of this version's validity window. '9999-12-31' means current.

      - name: seed_booking_status_history
        description: >
          Event log of booking status transitions (simulates a Kafka topic).
          Used to build the accumulating snapshot.
        columns:
          - name: booking_id
            description: Booking this status change belongs to.
          - name: booking_status
            description: The status the booking transitioned to.
          - name: changed_at
            description: Timestamp of the status change.

      - name: seed_care_tickets
        description: Customer care ticket records (simulates the care system database).
        columns:
          - name: ticket_id
            description: Unique identifier for each care ticket.
          - name: booking_id
            description: Associated booking, if any.

      - name: seed_dim_date
        description: Date spine reference table (simulates dwh.dim_date_v3).
        columns:
          - name: date_id
            description: Calendar date.

      - name: seed_tour_history
        description: >
          SCD2 history of tour attribute changes (simulates db_mirror_dbz.gyg__tour_history).
          Each row is a state change with is_online flag.
        columns:
          - name: tour_id
            description: Tour identifier.
          - name: user_id
            description: Supplier (user) who owns this tour.
          - name: is_online
            description: Whether the tour was online at this point.
          - name: update_timestamp_org
            description: When the state change occurred.

      - name: seed_tour_option_bookable_history
        description: >
          CDC log of tour option bookable status changes
          (simulates db_mirror_dbz.inventory__tour_option_bookable_history).
        columns:
          - name: tour_id
            description: Parent tour identifier.
          - name: tour_option_id
            description: Tour option identifier.
          - name: binlog_timestamp
            description: Timestamp of the CDC event.
          - name: bookable_status
            description: Whether the option became bookable (true) or not (false).

      - name: seed_reviews
        description: Tour review records (simulates production.core.fact_review).
        columns:
          - name: review_id
            description: Unique review identifier.
          - name: activity_id
            description: Tour (activity) this review belongs to.
          - name: status
            description: Review status (active, inactive).
          - name: created_at
            description: When the review was created.

      - name: seed_supplier_dim
        description: >
          Supplier dimension latest state (simulates production.core.dim_supplier).
          Contains registration and type metadata for lifecycle filtering.
        columns:
          - name: user_id
            description: Supplier user identifier.
          - name: user_type
            description: Account type (supplier, internal, etc).
          - name: company_name
            description: Supplier company name.
          - name: date_of_registration
            description: When the supplier registered.

      - name: seed_supplier_status_history
        description: >
          Supplier gyg_status change history (simulates db_mirror_dbz.gyg__supplier_history).
          Used to detect self-requested deactivation windows.
        columns:
          - name: user_id
            description: Supplier user identifier.
          - name: gyg_status
            description: Status value (active, deactivated).
          - name: deactivation_reason_id
            description: Reason code for deactivation (null if activation).
          - name: update_timestamp
            description: When the status change occurred.
