version: 2

models:
  - name: stg_seed_data__customers
    description: >
      Staged customer account records from the seed_data source. Applies type
      casting to the customer table. No joins — pure 1:1 mirror of the source.
    config:
      group: boi
      materialized: view
    meta:
      owner: boi
    columns:
      - name: customer_id
        description: Unique identifier for each customer account.
        data_type: bigint
        tests:
          - unique
          - not_null
      - name: customer_email
        description: Primary contact email for the customer (redacted in non-production environments).
        data_type: string
      - name: customer_country
        description: ISO 2-letter country code of the customer's registered address.
        data_type: string
      - name: signup_source
        description: Acquisition channel through which the customer registered. Valid values — organic, paid, referral.
        data_type: string
        tests:
          - accepted_values:
              values: ['organic', 'paid', 'referral']
      - name: is_verified
        description: Whether the customer has completed email verification.
        data_type: boolean
      - name: created_at
        description: Timestamp when the customer account was created (UTC).
        data_type: timestamp
      - name: updated_at
        description: Timestamp of the most recent update to this customer record (UTC).
        data_type: timestamp
