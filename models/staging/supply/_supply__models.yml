version: 2

models:
  - name: stg_seed_data__suppliers
    description: >
      Staged supplier account records from the seed_data source. Applies type
      casting to the current-state supplier table. No joins — pure 1:1 mirror.
    config:
      group: boi
      materialized: view
    meta:
      owner: boi
    columns:
      - name: supplier_id
        description: Unique identifier for each supplier account.
        data_type: bigint
        tests:
          - unique
          - not_null
      - name: supplier_name
        description: Business name of the supplier.
        data_type: string
      - name: supplier_email
        description: Primary contact email for the supplier.
        data_type: string
      - name: destination_id
        description: Primary destination this supplier operates in.
        data_type: bigint
      - name: is_verified
        description: Whether the supplier has completed the verification process.
        data_type: boolean
      - name: is_active
        description: Whether the supplier account is currently active.
        data_type: boolean
      - name: created_at
        description: Timestamp when the supplier account was created (UTC).
        data_type: timestamp
      - name: updated_at
        description: Timestamp of the most recent update to this supplier record (UTC).
        data_type: timestamp

  - name: stg_seed_data__supplier_versions
    description: >
      Staged SCD Type 2 supplier history from the seed_data source. Each row
      represents one version of a supplier record with valid_from/valid_to
      range. Used to build dim_suppliers_history (SCD2 dimension).
    config:
      group: boi
      materialized: view
    meta:
      owner: boi
    columns:
      - name: supplier_id
        description: Supplier identifier — not unique across rows, repeats per version.
        data_type: bigint
        tests:
          - not_null
      - name: supplier_name
        description: Business name of the supplier at this version.
        data_type: string
      - name: supplier_email
        description: Contact email at this version.
        data_type: string
      - name: destination_id
        description: Primary destination at this version.
        data_type: bigint
      - name: is_verified
        description: Verification status at this version.
        data_type: boolean
      - name: is_active
        description: Active status at this version.
        data_type: boolean
      - name: valid_from
        description: Start of this version's validity window (UTC).
        data_type: timestamp
        tests:
          - not_null
      - name: valid_to
        description: >
          End of this version's validity window (UTC).
          '9999-12-31 23:59:59' indicates the currently active version.
        data_type: timestamp
        tests:
          - not_null
      - name: operation
        description: The operation that created this version — 'insert' or 'update'.
        data_type: string

  - name: stg_seed_data__destinations
    description: >
      Staged destination reference data from the seed_data source. Represents
      travel destinations (cities) where GYG operates.
    config:
      group: boi
      materialized: view
    meta:
      owner: boi
    columns:
      - name: destination_id
        description: Unique identifier for each destination.
        data_type: bigint
        tests:
          - unique
          - not_null
      - name: destination_name
        description: Display name of the destination (typically the city name).
        data_type: string
      - name: destination_city
        description: City where the destination is located.
        data_type: string
      - name: destination_country
        description: Country of the destination.
        data_type: string
      - name: destination_continent
        description: Continent of the destination (e.g. 'Europe', 'Asia').
        data_type: string
      - name: is_active
        description: Whether this destination is currently active on the platform.
        data_type: boolean
      - name: created_at
        description: Timestamp when the destination was first added (UTC).
        data_type: timestamp
      - name: updated_at
        description: Timestamp of the most recent update (UTC).
        data_type: timestamp

  - name: stg_seed_data__tours
    description: >
      Staged tour/activity catalog from the seed_data source. Each row is a
      bookable tour offered by a supplier at a destination.
    config:
      group: boi
      materialized: view
    meta:
      owner: boi
    columns:
      - name: tour_id
        description: Unique identifier for each tour.
        data_type: bigint
        tests:
          - unique
          - not_null
      - name: tour_name
        description: Display name of the tour.
        data_type: string
      - name: supplier_id
        description: Foreign key to the supplier offering this tour.
        data_type: bigint
      - name: destination_id
        description: Foreign key to the destination where this tour operates.
        data_type: bigint
      - name: tour_category
        description: >
          Category of the tour — e.g. 'walking_tour', 'landmark', 'museum',
          'bike_tour', 'food_tour', 'boat_tour'.
        data_type: string
      - name: price_in_cents
        description: Listed price per person in minor currency units (cents).
        data_type: bigint
      - name: currency_code
        description: ISO 4217 currency code for the price.
        data_type: string
      - name: duration_minutes
        description: Duration of the tour in minutes.
        data_type: int
      - name: is_active
        description: Whether this tour is currently bookable.
        data_type: boolean
      - name: created_at
        description: Timestamp when the tour was first listed (UTC).
        data_type: timestamp
      - name: updated_at
        description: Timestamp of the most recent update (UTC).
        data_type: timestamp
